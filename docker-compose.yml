
services:
  # ── Postgres ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-gadnuc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gadnuc}
      POSTGRES_DB:       ${POSTGRES_DB:-gadnuc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gadnuc}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Inventory Server ──────────────────────────────────────────────────────────
  inventory-server:
    build:
      context: .
      dockerfile: apps/inventory-server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - '3001:3001'
    environment:
      NODE_ENV:                    production
      PORT:                        3001
      DATABASE_URL:                postgresql://${POSTGRES_USER:-gadnuc}:${POSTGRES_PASSWORD:-gadnuc}@postgres:5432/${POSTGRES_DB:-gadnuc}
      DB_SSL:                      "false"
      REDIS_URL:                   redis://redis:6379
      JWT_SECRET:                  ${JWT_SECRET}
      JWT_REFRESH_SECRET:          ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY:           ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:       ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CONNECT_CLIENT_ID:    ${STRIPE_CONNECT_CLIENT_ID}
      STRIPE_CONNECT_REDIRECT_URI: ${STRIPE_CONNECT_REDIRECT_URI}
      PLATFORM_FEE_PCT:            ${PLATFORM_FEE_PCT:-5}
      PLATFORM_DOMAIN:             ${PLATFORM_DOMAIN:-gadnuc.com}
      TOTP_ENCRYPTION_KEY:         ${TOTP_ENCRYPTION_KEY}
      ALLOWED_ORIGINS:             ${ALLOWED_ORIGINS}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Server Manager ────────────────────────────────────────────────────────────
  server-manager:
    build:
      context: .
      dockerfile: apps/server-manager/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - '3002:3002'
    environment:
      NODE_ENV:            production
      PORT:                3002
      DATABASE_URL:        postgresql://${POSTGRES_USER:-gadnuc}:${POSTGRES_PASSWORD:-gadnuc}@postgres:5432/${POSTGRES_DB:-gadnuc}
      DB_SSL:              "false"
      REDIS_URL:           redis://redis:6379
      JWT_SECRET:          ${JWT_SECRET}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY:   ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ADMIN_ORIGIN:        ${ADMIN_ORIGIN:-http://localhost:3000}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Storefront (Next.js) ──────────────────────────────────────────────────────
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    restart: unless-stopped
    depends_on:
      inventory-server: { condition: service_healthy }
      server-manager:   { condition: service_healthy }
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:                    production
      PLATFORM_DOMAIN:             ${PLATFORM_DOMAIN:-gadnuc.com}
      INVENTORY_SERVER_URL:        http://inventory-server:3001
      MANAGER_SERVER_URL:          http://server-manager:3002
      NEXT_PUBLIC_INVENTORY_URL:   ${NEXT_PUBLIC_INVENTORY_URL:-http://localhost:3001}
      NEXT_PUBLIC_MANAGER_URL:     ${NEXT_PUBLIC_MANAGER_URL:-http://localhost:3002}
      NEXT_PUBLIC_WS_URL:          ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}

volumes:
  postgres_data:
  redis_data:
