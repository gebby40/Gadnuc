name: gadnuc
region: nyc

services:
  # ── Storefront (Next.js) — public-facing ───────────────────────────────────
  - name: storefront
    dockerfile_path: apps/storefront/Dockerfile
    github:
      repo: gebby40/Gadnuc
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 15
    envs:
      - key: NODE_ENV
        value: production
      - key: PLATFORM_DOMAIN
        value: gadnuc.com
      - key: INVENTORY_SERVER_URL
        value: ${inventory-server.PRIVATE_URL}
      - key: MANAGER_SERVER_URL
        value: ${server-manager.PRIVATE_URL}
      # Empty = relative paths; browser calls /api/* which proxy routes forward
      - key: NEXT_PUBLIC_INVENTORY_URL
        scope: BUILD_TIME
        value: ""
      - key: NEXT_PUBLIC_MANAGER_URL
        scope: BUILD_TIME
        value: /manager
      - key: NEXT_PUBLIC_WS_URL
        scope: BUILD_TIME
        value: ""

  # ── Inventory Server — internal only ───────────────────────────────────────
  - name: inventory-server
    dockerfile_path: apps/inventory-server/Dockerfile
    github:
      repo: gebby40/Gadnuc
      branch: main
      deploy_on_push: true
    internal_ports:
      - 3001
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /health
      port: 3001
      initial_delay_seconds: 30
      period_seconds: 15
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${gadnuc-db.DATABASE_URL}
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        type: SECRET
      - key: TOTP_ENCRYPTION_KEY
        type: SECRET
      - key: STRIPE_SECRET_KEY
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        type: SECRET
      - key: STRIPE_CONNECT_CLIENT_ID
        type: SECRET
      - key: STRIPE_CONNECT_REDIRECT_URI
        value: https://gadnuc.com/api/stripe-connect/callback
      - key: PLATFORM_FEE_PCT
        value: "5"
      - key: PLATFORM_DOMAIN
        value: gadnuc.com
      - key: ALLOWED_ORIGINS
        value: https://gadnuc.com
      - key: SMTP_HOST
        value: smtp.mailgun.org
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        type: SECRET
      - key: SMTP_PASS
        type: SECRET
      - key: EMAIL_FROM
        value: orders@gadnuc.com
      - key: DO_SPACES_KEY
        type: SECRET
      - key: DO_SPACES_SECRET
        type: SECRET
      - key: DO_SPACES_BUCKET
        value: gadnuc-media
      - key: DO_SPACES_REGION
        value: nyc3

  # ── Server Manager — internal only ─────────────────────────────────────────
  - name: server-manager
    dockerfile_path: apps/server-manager/Dockerfile
    github:
      repo: gebby40/Gadnuc
      branch: main
      deploy_on_push: true
    internal_ports:
      - 3002
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /health
      port: 3002
      initial_delay_seconds: 30
      period_seconds: 15
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${gadnuc-db.DATABASE_URL}
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        type: SECRET
      - key: STRIPE_SECRET_KEY
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        type: SECRET
      - key: ADMIN_ORIGIN
        value: https://gadnuc.com

databases:
  - name: gadnuc-db
    engine: PG
    cluster_name: gadnuc-db
    db_name: defaultdb
    db_user: doadmin
    production: true
