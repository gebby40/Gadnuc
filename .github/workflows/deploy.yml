name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all / inventory-server / server-manager / storefront)'
        required: true
        default: 'all'
        type: choice
        options: [all, inventory-server, server-manager, storefront]

env:
  REGISTRY: registry.digitalocean.com/gadnuc

jobs:
  build-inventory-server:
    name: Build inventory-server
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'inventory-server'
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push inventory-server
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/inventory-server/Dockerfile
          push:       true
          tags:       |
            ${{ env.REGISTRY }}/inventory-server:${{ github.sha }}
            ${{ env.REGISTRY }}/inventory-server:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-server-manager:
    name: Build server-manager
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'server-manager'
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/server-manager/Dockerfile
          push:       true
          tags:       |
            ${{ env.REGISTRY }}/server-manager:${{ github.sha }}
            ${{ env.REGISTRY }}/server-manager:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-storefront:
    name: Build storefront
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'storefront'
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/storefront/Dockerfile
          push:       true
          tags:       |
            ${{ env.REGISTRY }}/storefront:${{ github.sha }}
            ${{ env.REGISTRY }}/storefront:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean App Platform
    runs-on: ubuntu-latest
    needs: [build-inventory-server, build-server-manager, build-storefront]
    if: always() && !cancelled() && !failure()
    environment:
      name: production
      url: https://gadnuc.com
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Update App Platform with new images
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} \
            --spec .do/app.yaml

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for deployment to go active..."
          for i in $(seq 1 30); do
            STATUS=$(doctl apps get ${{ secrets.DO_APP_ID }} --format ActiveDeployment.Phase --no-header)
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "ACTIVE" ] && exit 0
            sleep 10
          done
          echo "Deployment did not reach ACTIVE state after 5 minutes"
          exit 1

      - name: Run smoke tests
        run: |
          curl -f https://gadnuc.com/health || exit 1
          echo "Smoke test passed"

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Report status
        run: |
          STATUS="${{ needs.deploy.result }}"
          echo "Deploy result: $STATUS"
          if [ "$STATUS" = "success" ]; then
            echo "✅ Deployment to production succeeded (commit: ${{ github.sha }})"
          else
            echo "❌ Deployment failed — check the workflow logs"
          fi
