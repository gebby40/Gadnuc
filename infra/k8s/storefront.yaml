apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: gadnuc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storefront
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: storefront
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: storefront
          image: registry.digitalocean.com/gadnuc/storefront:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: INVENTORY_SERVER_URL
              value: "http://inventory-server.gadnuc.svc.cluster.local:3001"
            - name: PLATFORM_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: gadnuc-config
                  key: PLATFORM_DOMAIN
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: gadnuc
spec:
  selector:
    app: storefront
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storefront-ingress
  namespace: gadnuc
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - "*.gadnuc.io"
        - gadnuc.io
      secretName: gadnuc-tls
  rules:
    - host: "*.gadnuc.io"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 3000
