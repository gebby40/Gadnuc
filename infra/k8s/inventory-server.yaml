apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-server
  namespace: gadnuc
  labels:
    app: inventory-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: inventory-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: inventory-server
          image: registry.digitalocean.com/gadnuc/inventory-server:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gadnuc-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gadnuc-secrets
                  key: JWT_SECRET
            - name: PLATFORM_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: gadnuc-config
                  key: PLATFORM_DOMAIN
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-server
  namespace: gadnuc
spec:
  selector:
    app: inventory-server
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
